name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  daemon:
    name: Rust daemon (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux tray dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libxdo-dev libappindicator3-dev

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint daemon
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Generate test HTTPS certificate
        shell: bash
        env:
          MSYS_NO_PATHCONV: '1'
        run: |
          openssl req -x509 -newkey rsa:2048 -nodes -subj "/CN=localhost" -keyout "$RUNNER_TEMP/office-mcp-localhost.key" -out "$RUNNER_TEMP/office-mcp-localhost.crt" -days 1
          openssl pkcs12 -export -out .office-mcp-localhost.pfx -inkey "$RUNNER_TEMP/office-mcp-localhost.key" -in "$RUNNER_TEMP/office-mcp-localhost.crt" -passout pass:office-mcp-localhost

      - name: Test daemon
        run: cargo test --workspace

  evidence:
    name: Evidence harness
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/office-mcp/daemon/evidence/package-lock.json

      - name: Install evidence dependencies
        working-directory: src/office-mcp/daemon/evidence
        run: npm ci

      - name: Type-check evidence harness
        working-directory: src/office-mcp/daemon/evidence
        run: npm run check

  packaging-smoke:
    name: Packaging smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packaging/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux tray dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libxdo-dev libappindicator3-dev

      - name: Install packaging dependencies
        working-directory: packaging
        run: npm ci

      - name: Run packaging smoke checks
        working-directory: packaging
        run: npm run check

      - name: Run native tray probe
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/office-mcp-ui-state.json" <<'JSON'
          {"daemon":{"status":"up"},"clients":[{"client_id":"ci-client"}],"documents":{"word":[{"session_id":"ci-word"}],"excel":[{"session_id":"ci-excel"}]},"current_tasks":[]}
          JSON
          cargo run -q -p office-mcp-daemon -- tray --probe --probe-state-path "$RUNNER_TEMP/office-mcp-ui-state.json" > "$RUNNER_TEMP/office-mcp-tray-probe.json"
          cat "$RUNNER_TEMP/office-mcp-tray-probe.json"
          grep -q '"native_host":true' "$RUNNER_TEMP/office-mcp-tray-probe.json"
          grep -q '"state_fetch_ok":true' "$RUNNER_TEMP/office-mcp-tray-probe.json"

  addin:
    name: Add-in validation
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/office-ctl/word/package-lock.json

      - name: Install add-in dependencies
        working-directory: src/office-ctl/word
        run: npm ci

      - name: Validate Word add-in
        working-directory: src/office-ctl/word
        run: npm run check

      - name: Check Windows bootstrap scripts syntax
        shell: pwsh
        run: |
          $paths = @('packaging/windows/install-windows.ps1', 'packaging/windows/uninstall-windows.ps1', 'packaging/windows/build-windows-msi.ps1', 'packaging/windows/export-localhost-dev-cert.ps1', 'packaging/homebrew/render-formula.ps1', 'src/office-ctl/word/scripts/render-hosted-manifest.ps1', 'src/office-ctl/word/scripts/build-appsource-package.ps1')
          foreach ($path in $paths) {
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw $path), [ref]$errors) | Out-Null
            if ($errors) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }

  windows-msi:
    name: Windows MSI packaging
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            src/office-mcp/daemon/evidence/package-lock.json
            src/office-ctl/word/package-lock.json
            packaging/package-lock.json

      - name: Install evidence dependencies
        working-directory: src/office-mcp/daemon/evidence
        run: npm ci

      - name: Install add-in dependencies
        working-directory: src/office-ctl/word
        run: npm ci

      - name: Install Excel add-in dependencies
        working-directory: src/office-ctl/excel
        run: npm ci

      - name: Install PowerPoint add-in dependencies
        working-directory: src/office-ctl/powerpoint
        run: npm ci

      - name: Install packaging dependencies
        working-directory: packaging
        run: npm ci

      - name: Check packaging scripts
        working-directory: packaging
        run: npm run check

      - name: Build MSI
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\packaging\windows\build-windows-msi.ps1 -SkipNpmInstall

      - name: Verify MSI artifact
        shell: pwsh
        run: |
          $msi = Get-Item .\artifacts\office-mcp-setup-0.1.0-x64.msi
          if ($msi.Length -lt 1000000) {
            throw "MSI artifact is unexpectedly small: $($msi.Length) bytes"
          }
          Write-Output "Built $($msi.FullName) ($($msi.Length) bytes)"
