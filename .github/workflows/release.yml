name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semantic version bump to release.'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve or create release version
        id: version
        shell: pwsh
        run: |
          if (Get-Variable PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }

          if ('${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}'.TrimStart('v')
            if ($version -notmatch '^\d+\.\d+\.\d+(-[A-Za-z0-9.-]+)?$') {
              throw "Invalid release tag version: $version"
            }
            "version=$version" >> $env:GITHUB_OUTPUT
            "tag=v$version" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $bump = '${{ github.event.inputs.bump }}'
          if ($bump -notin @('patch', 'minor', 'major')) {
            throw "Invalid bump selection: $bump"
          }

          $package = Get-Content -LiteralPath 'packaging/package.json' -Raw | ConvertFrom-Json
          $currentVersion = [string]$package.version
          $match = [regex]::Match($currentVersion, '^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$')
          if (-not $match.Success) {
            throw "Current package version is not a plain SemVer release: $currentVersion"
          }

          $major = [int]$match.Groups['major'].Value
          $minor = [int]$match.Groups['minor'].Value
          $patch = [int]$match.Groups['patch'].Value
          switch ($bump) {
            'major' { $major += 1; $minor = 0; $patch = 0 }
            'minor' { $minor += 1; $patch = 0 }
            'patch' { $patch += 1 }
          }

          $version = "$major.$minor.$patch"
          $tag = "v$version"
          git show-ref --tags --verify --quiet "refs/tags/$tag"
          $localTagExit = $LASTEXITCODE
          if ($localTagExit -eq 0) {
            throw "Version tag already exists locally: $tag"
          }
          if ($localTagExit -ne 1) {
            throw "Unable to check local tag state for $tag"
          }

          git ls-remote --exit-code --tags origin "refs/tags/$tag" | Out-Null
          $remoteTagExit = $LASTEXITCODE
          if ($remoteTagExit -eq 0) {
            throw "Version tag already exists on origin: $tag"
          }
          if ($remoteTagExit -ne 2) {
            throw "Unable to check remote tag state for $tag"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          exit 0

      - name: Update version metadata
        if: github.ref_type != 'tag'
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $jsonEncoding = New-Object System.Text.UTF8Encoding($false)

          $packagePath = 'packaging/package.json'
          $package = Get-Content -LiteralPath $packagePath -Raw | ConvertFrom-Json -AsHashtable
          $package['version'] = $version
          [System.IO.File]::WriteAllText($packagePath, (($package | ConvertTo-Json -Depth 20) + "`n"), $jsonEncoding)

          $lockPath = 'packaging/package-lock.json'
          $lock = Get-Content -LiteralPath $lockPath -Raw | ConvertFrom-Json -AsHashtable
          $lock['version'] = $version
          $lock['packages']['']['version'] = $version
          [System.IO.File]::WriteAllText($lockPath, (($lock | ConvertTo-Json -Depth 20) + "`n"), $jsonEncoding)

          $cargoTomlPath = 'src/office-mcp/daemon/Cargo.toml'
          $cargoToml = Get-Content -LiteralPath $cargoTomlPath -Raw
          $cargoToml = [regex]::Replace(
            $cargoToml,
            '(?m)^version\s*=\s*"[^"]+"',
            "version = `"$version`"",
            1
          )
          [System.IO.File]::WriteAllText($cargoTomlPath, $cargoToml, $jsonEncoding)

          $cargoLockPath = 'Cargo.lock'
          $cargoLock = Get-Content -LiteralPath $cargoLockPath -Raw
          $cargoLock = [regex]::Replace(
            $cargoLock,
            '(?ms)(\[\[package\]\]\s+name = "office-mcp-daemon"\s+version = ")[^"]+("\s+dependencies = \[)',
            "`${1}$version`${2}",
            1
          )
          [System.IO.File]::WriteAllText($cargoLockPath, $cargoLock, $jsonEncoding)

      - name: Commit version bump and push tag
        if: github.ref_type != 'tag'
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $tag = '${{ steps.version.outputs.tag }}'

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git status --short
          git diff --check
          git add packaging/package.json packaging/package-lock.json src/office-mcp/daemon/Cargo.toml Cargo.lock
          git diff --cached --exit-code --quiet && throw "No version metadata changes were staged for $tag"
          git commit -m "Release v$version"
          git push origin HEAD:main
          git tag "v$version"
          git push origin "v$version"

  windows-portable:
    name: Windows portable release artifact
    needs: prepare-release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $version = '${{ needs.prepare-release.outputs.version }}'
          if ($version -notmatch '^\d+\.\d+\.\d+(-[A-Za-z0-9.-]+)?$') {
            throw "Invalid release version: $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            src/office-mcp/daemon/evidence/package-lock.json
            src/office-ctl/word/package-lock.json
            src/office-ctl/excel/package-lock.json
            src/office-ctl/powerpoint/package-lock.json
            packaging/package-lock.json

      - name: Install evidence dependencies
        working-directory: src/office-mcp/daemon/evidence
        run: npm ci

      - name: Install Word add-in dependencies
        working-directory: src/office-ctl/word
        run: npm ci

      - name: Install Excel add-in dependencies
        working-directory: src/office-ctl/excel
        run: npm ci

      - name: Install PowerPoint add-in dependencies
        working-directory: src/office-ctl/powerpoint
        run: npm ci

      - name: Install packaging dependencies
        working-directory: packaging
        run: npm ci

      - name: Check working tree whitespace
        shell: pwsh
        run: git diff --check

      - name: Validate release version metadata
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $package = Get-Content -LiteralPath 'packaging/package.json' -Raw | ConvertFrom-Json
          if ($package.version -ne $version) {
            throw "Release version mismatch: packaging/package.json has $($package.version), expected $version"
          }

          $cargoToml = Get-Content -LiteralPath 'src/office-mcp/daemon/Cargo.toml' -Raw
          $cargoVersionMatch = [regex]::Match($cargoToml, '(?m)^version\s*=\s*"(?<version>[^"]+)"')
          if (-not $cargoVersionMatch.Success) {
            throw 'Release version mismatch: src/office-mcp/daemon/Cargo.toml has no package version'
          }
          $cargoVersion = $cargoVersionMatch.Groups['version'].Value
          if ($cargoVersion -ne $version) {
            throw "Release version mismatch: src/office-mcp/daemon/Cargo.toml has $cargoVersion, expected $version"
          }

      - name: Check PowerShell scripts syntax
        shell: pwsh
        run: |
          $scripts = @(
            'packaging/windows/install-windows.ps1',
            'packaging/windows/build-windows-portable.ps1',
            'packaging/windows/uninstall-windows.ps1',
            'packaging/windows/export-localhost-dev-cert.ps1',
            'src/office-ctl/common/scripts/render-hosted-manifest.ps1',
            'src/office-ctl/word/scripts/render-hosted-manifest.ps1',
            'src/office-ctl/excel/scripts/render-hosted-manifest.ps1',
            'src/office-ctl/powerpoint/scripts/render-hosted-manifest.ps1'
          )
          foreach ($script in $scripts) {
            if (-not (Test-Path -LiteralPath $script)) {
              throw "PowerShell syntax check target is missing: $script"
            }
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content -LiteralPath $script -Raw), [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $formatted = $errors | ForEach-Object { "${script}:$($_.Token.StartLine):$($_.Message)" }
              throw "PowerShell syntax errors found:`n$($formatted -join "`n")"
            }
          }

      - name: Run Word add-in checks
        working-directory: src/office-ctl/word
        run: npm run check

      - name: Run Excel add-in checks
        working-directory: src/office-ctl/excel
        run: npm run check

      - name: Run PowerPoint add-in checks
        working-directory: src/office-ctl/powerpoint
        run: npm run check

      - name: Prepare daemon test certificate
        shell: pwsh
        run: |
          $pfxPath = 'src/office-mcp/daemon/.office-mcp-localhost.pfx'
          $cert = New-SelfSignedCertificate `
            -DnsName 'localhost' `
            -CertStoreLocation 'Cert:\CurrentUser\My' `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -KeyExportPolicy Exportable `
            -NotAfter (Get-Date).AddDays(2)
          try {
            $secure = ConvertTo-SecureString -String 'office-mcp-localhost' -Force -AsPlainText
            Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $secure | Out-Null
          } finally {
            Remove-Item -LiteralPath "Cert:\CurrentUser\My\$($cert.Thumbprint)" -Force -ErrorAction SilentlyContinue
          }
          if (-not (Test-Path -LiteralPath $pfxPath)) {
            throw "Daemon test certificate was not created: $pfxPath"
          }

      - name: Run daemon tests
        working-directory: src/office-mcp
        run: cargo test -p office-mcp-daemon

      - name: Run daemon evidence checks
        working-directory: src/office-mcp/daemon/evidence
        run: npm run check

      - name: Run packaging smoke checks
        working-directory: packaging
        run: npm run check

      - name: Generate rendered logo review
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          node .\src\office-ctl\common\scripts\record-rendered-logo-review.mjs `
            --output artifacts\logo-rendered-size-review.json `
            --sheet artifacts\logo-rendered-size-review.png

      - name: Build Windows portable zip
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\packaging\windows\build-windows-portable.ps1 -Version ${{ steps.version.outputs.version }} -SkipNpmInstall

      - name: Generate catalog identity review
        shell: pwsh
        run: |
          node .\src\office-ctl\common\scripts\record-catalog-identity-review.mjs `
            --catalog-path artifacts\portable-stage\addin-catalog `
            --output artifacts\catalog-identity-review.json

      - name: Stage release artifacts
        id: stage
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $releaseZip = "artifacts\office-mcp-windows-portable-$version-x64.zip"
          if (-not (Test-Path -LiteralPath $releaseZip)) {
            throw "Portable ZIP artifact was not produced: $releaseZip"
          }
          $zip = Get-Item -LiteralPath $releaseZip
          if ($zip.Length -lt 1000000) {
            throw "Portable ZIP artifact is unexpectedly small: $($zip.Length) bytes"
          }
          $renderedLogoReview = 'artifacts\logo-rendered-size-review.json'
          $renderedLogoSheet = 'artifacts\logo-rendered-size-review.png'
          foreach ($path in @($renderedLogoReview, $renderedLogoSheet)) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Rendered logo review artifact is missing: $path"
            }
          }
          $review = Get-Content -LiteralPath $renderedLogoReview -Raw | ConvertFrom-Json
          if ($review.ready -ne $true) {
            throw "Rendered logo review is not ready: $renderedLogoReview"
          }
          $catalogIdentityReview = 'artifacts\catalog-identity-review.json'
          if (-not (Test-Path -LiteralPath $catalogIdentityReview)) {
            throw "Catalog identity review artifact is missing: $catalogIdentityReview"
          }
          $catalogReview = Get-Content -LiteralPath $catalogIdentityReview -Raw | ConvertFrom-Json
          if ($catalogReview.ready -ne $true) {
            throw "Catalog identity review is not ready: $catalogIdentityReview"
          }
          $required = @(
            'artifacts\portable-stage\office-mcp-daemon.exe',
            'artifacts\portable-stage\README-install.txt',
            'artifacts\portable-stage\install.ps1',
            'artifacts\portable-stage\uninstall.ps1',
            'artifacts\portable-stage\office-mcp\ui\index.html',
            'artifacts\portable-stage\office-ctl\common\addin-channel.js',
            'artifacts\portable-stage\office-ctl\word\public\taskpane.js',
            'artifacts\portable-stage\office-ctl\excel\public\taskpane.js',
            'artifacts\portable-stage\office-ctl\powerpoint\public\taskpane.js',
            'artifacts\portable-stage\addin-catalog\office-mcp-word.xml',
            'artifacts\portable-stage\addin-catalog\office-mcp-excel.xml',
            'artifacts\portable-stage\addin-catalog\office-mcp-powerpoint.xml',
            'artifacts\portable-stage\scripts\export-localhost-dev-cert.ps1',
            'artifacts\portable-stage\office-ctl\common\assets\icon-32.png',
            'artifacts\portable-stage\office-ctl\common\assets\icon-80.png'
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Release payload is missing required file: $path"
            }
          }
          $forbidden = @(
            'artifacts\portable-stage\office-mcp.ps1',
            'artifacts\portable-stage\office-mcp-daemon.ps1',
            'artifacts\portable-stage\office-mcp-tray.ps1',
            'artifacts\portable-stage\office-mcp-env.ps1'
          )
          foreach ($path in $forbidden) {
            if (Test-Path -LiteralPath $path) {
              throw "Release payload must not include duplicate root launcher: $path"
            }
          }
          Push-Location artifacts
          try {
            Get-FileHash -Algorithm SHA256 -LiteralPath @(
              (Split-Path -Leaf $releaseZip),
              'logo-rendered-size-review.json',
              'logo-rendered-size-review.png',
              'catalog-identity-review.json'
            ) |
              ForEach-Object { "$($_.Hash.ToLowerInvariant())  $($_.Path | Split-Path -Leaf)" } |
              Set-Content -LiteralPath SHA256SUMS -Encoding ascii
          } finally {
            Pop-Location
          }
          "portable_zip=$releaseZip" >> $env:GITHUB_OUTPUT
          "checksums=artifacts\SHA256SUMS" >> $env:GITHUB_OUTPUT
          "rendered_logo_review=$renderedLogoReview" >> $env:GITHUB_OUTPUT
          "rendered_logo_sheet=$renderedLogoSheet" >> $env:GITHUB_OUTPUT
          "catalog_identity_review=$catalogIdentityReview" >> $env:GITHUB_OUTPUT

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: office-mcp-windows-portable-${{ steps.version.outputs.version }}
          path: |
            ${{ steps.stage.outputs.portable_zip }}
            ${{ steps.stage.outputs.checksums }}
            ${{ steps.stage.outputs.rendered_logo_review }}
            ${{ steps.stage.outputs.rendered_logo_sheet }}
            ${{ steps.stage.outputs.catalog_identity_review }}

      - name: Create GitHub release draft
        if: startsWith(needs.prepare-release.outputs.tag, 'v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: |
            ${{ steps.stage.outputs.portable_zip }}
            ${{ steps.stage.outputs.checksums }}
            ${{ steps.stage.outputs.rendered_logo_review }}
            ${{ steps.stage.outputs.rendered_logo_sheet }}
            ${{ steps.stage.outputs.catalog_identity_review }}
          generate_release_notes: true
