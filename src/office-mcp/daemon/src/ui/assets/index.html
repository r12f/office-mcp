<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Office MCP Control</title>
    <link rel="stylesheet" href="/ui/app.css" />
    <script defer src="/ui/app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#activity">Skip to activity</a>
    <main class="shell">
      <header class="status-strip" aria-label="Daemon status">
        <div class="identity">
          <img class="product-mark" src="/assets/icon-32.png" width="32" height="32" alt="" aria-hidden="true" />
          <span id="healthBadge" class="badge neutral">Loading…</span>
          <div>
            <h1>Office MCP Control</h1>
            <p id="daemonMeta">Waiting for daemon state</p>
          </div>
        </div>
        <dl class="metrics" aria-label="Connection counts">
          <div><dt>Clients</dt><dd id="clientCount">0</dd></div>
          <div><dt>Documents</dt><dd id="documentCount">0</dd></div>
          <div><dt>Active Tasks</dt><dd id="taskCount">0</dd></div>
        </dl>
        <div class="endpoints" aria-label="Endpoints">
          <button type="button" class="copy" data-copy="mcpEndpoint" aria-label="Copy MCP endpoint"><span>MCP</span><code id="mcpEndpoint">-</code></button>
          <button type="button" class="copy" data-copy="addinEndpoint" aria-label="Copy add-in endpoint"><span>Add-in</span><code id="addinEndpoint">-</code></button>
        </div>
        <div class="details" aria-label="Daemon details">
          <dl>
            <div><dt>Version</dt><dd id="daemonVersion">-</dd></div>
            <div><dt>Uptime</dt><dd id="daemonUptime">-</dd></div>
            <div class="detail-path"><dt>Config</dt><dd><span class="detail-path-value"><code id="configPath" tabindex="0">-</code><span class="detail-actions"><button type="button" class="detail-copy" data-copy="configPath" aria-label="Copy config path">Copy</button><button type="button" class="detail-open" data-open-diagnostic="config" aria-label="Open config file location">Open</button></span></span></dd></div>
            <div class="detail-path"><dt>Log</dt><dd><span class="detail-path-value"><code id="logPath" tabindex="0">-</code><span class="detail-actions"><button type="button" class="detail-copy" data-copy="logPath" aria-label="Copy log path">Copy</button><button type="button" class="detail-open" data-open-diagnostic="log" aria-label="Open log file location">Open</button></span></span></dd></div>
            <div class="detail-error"><dt>Last error</dt><dd><span class="detail-log-value"><textarea id="lastError" readonly spellcheck="false" aria-label="Last daemon error">None</textarea><button type="button" class="detail-copy" data-copy="lastError" aria-label="Copy last error">Copy</button></span></dd></div>
          </dl>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel navigation" aria-labelledby="documentsHeading">
          <div class="panel-head">
            <h2 id="documentsHeading">Documents</h2>
            <div class="filter-row" aria-label="Document filters">
              <label class="field-label" for="appFilter">App</label>
              <select id="appFilter" name="app-filter" aria-label="Filter documents by app">
                <option value="all">All apps</option>
                <option value="word">Word</option>
                <option value="excel">Excel</option>
                <option value="powerpoint">PowerPoint</option>
                <option value="outlook">Outlook</option>
                <option value="other">Other</option>
              </select>
              <label class="field-label" for="search">Search</label><input id="search" name="session-filter" type="search" placeholder="Title, app, session&hellip;" autocomplete="off" />
            </div>
          </div>
          <div id="documents" class="stack"></div>
          <h3>Clients</h3>
          <div id="clients" class="stack compact"></div>
        </aside>

        <section id="activity" class="panel activity" aria-labelledby="activityHeading">
          <div class="panel-head">
            <h2 id="activityHeading">Activity</h2>
            <select id="resultFilter" name="result-filter" aria-label="Filter command history">
              <option value="all">All results</option>
              <option value="success">Succeeded</option>
              <option value="failure">Failed</option>
              <option value="timeout">Timed Out</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
          <h3>Current tasks</h3>
          <div id="currentTasks" class="table-region"></div>
          <h3>Recent command history</h3>
          <div id="history" class="table-region"></div>
        </section>

        <aside class="panel inspector" aria-labelledby="inspectorHeading">
          <div class="panel-head">
            <h2 id="inspectorHeading">Inspector</h2>
            <button id="clearInspector" type="button" class="secondary-action">Clear</button>
          </div>
          <section id="toolAccessPanel" class="tool-access-panel" aria-labelledby="toolAccessHeading">
            <div class="panel-head">
              <h3 id="toolAccessHeading">Global Tool Access</h3>
              <div id="toolAccessMode" class="segmented" role="radiogroup" aria-label="Global tool access mode">
                <button type="button" data-access-mode="read" role="radio" aria-checked="false">Read</button>
                <button type="button" data-access-mode="write" role="radio" aria-checked="false">Write</button>
                <button type="button" data-access-mode="all" role="radio" aria-checked="true">All</button>
              </div>
            </div>
            <div id="toolAccessList" class="tool-access-list"></div>
          </section>
          <pre id="inspector">Select a row.</pre>
        </aside>
      </section>
      <p id="announcer" class="sr-only" aria-live="polite"></p>
    </main>
  </body>
</html>
