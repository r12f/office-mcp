<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F7F8FA" />
    <title>MCP Control</title>
    <link rel="stylesheet" href="/common/taskpane.css?v=0.1.18" />
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script defer src="/common/browser-ui.js?v=0.1.18"></script>
    <script defer src="/common/addin-channel.js?v=0.1.18"></script>
    <script defer src="/common/logger.js?v=0.1.18"></script>
    <script defer src="/common/main-ui.js?v=0.1.18"></script>
    <script defer src="/common/task-history.js?v=0.1.18"></script>
    <script defer src="/word/taskpane.js?v=0.1.18"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to Status</a>
    <main id="main" class="taskpane-shell">
      <section class="panel summary-panel" aria-labelledby="documentHeading">
        <header class="topbar" aria-label="Daemon connection">
          <div class="identity">
            <img class="product-mark" src="/assets/icon-32.png" width="32" height="32" alt="" aria-hidden="true" />
            <div class="identity-copy">
              <span id="connectionBadge" class="status-badge status-neutral" aria-live="polite">Connecting…</span>
              <h1>MCP Control</h1>
            </div>
          </div>
        </header>

        <div class="section-heading document-heading">
          <h2 id="documentHeading">Document</h2>
        </div>
        <dl class="metadata-grid">
          <dt>Title</dt>
          <dd id="documentTitle">Unknown Word Document</dd>
          <dt>Session</dt>
          <dd><button type="button" class="metadata-copy" data-copy-target="session" aria-label="Copy session ID" title="Copy session ID"><code id="session">-</code></button></dd>
          <dt>Daemon</dt>
          <dd>
            <form id="settingsForm" class="daemon-endpoint-form" novalidate>
              <input id="endpointInput" class="daemon-endpoint-input" name="daemonEndpoint" type="url" inputmode="url" autocomplete="off" spellcheck="false" aria-label="Daemon endpoint" placeholder="wss://localhost:8765/addin" />
              <code id="daemon" class="sr-only">-</code>
              <button id="saveEndpoint" class="icon-button reconnect-button" type="submit" aria-label="Reconnect daemon" title="Reconnect daemon">
                <svg class="control-glyph" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M21 12a9 9 0 0 1-15.1 6.6" />
                  <path d="M3 12A9 9 0 0 1 18.1 5.4" />
                  <path d="M18 2v4h4" />
                  <path d="M6 22v-4H2" />
                </svg>
              </button>
            </form>
            <p id="endpointError" class="field-error" role="alert"></p>
          </dd>
          <dt>Runtime</dt>
          <dd id="runtimeVersions"><span id="serverVersion">Server Unknown</span> / <span id="protocolVersion">Protocol 1.0</span></dd>
          <dt>Host</dt>
          <dd id="hostPlatform">Word / Unknown</dd>
          <dt>Protection</dt>
          <dd id="protection">Not protected</dd>
          <dt>State</dt>
          <dd id="documentState">Editable</dd>
          <dt>Last Error</dt>
          <dd id="connectionDetail">None</dd>
        </dl>

        <details class="tools-panel">
          <summary>
            <span>Tools</span>
            <span id="toolCount" class="meta-pill">0/0</span>
          </summary>
          <div id="toolModeControl" class="tool-mode-control" role="radiogroup" aria-label="Tool capability mode">
            <button type="button" class="tool-mode-button" role="radio" aria-checked="false" data-tool-mode="read">Read</button>
            <button type="button" class="tool-mode-button" role="radio" aria-checked="false" data-tool-mode="write">Write</button>
            <button type="button" class="tool-mode-button" role="radio" aria-checked="true" data-tool-mode="all">All</button>
          </div>
          <div id="toolList" class="tool-list" aria-label="Word tool controls"></div>
        </details>
      </section>

      <section class="panel current-task-panel" aria-labelledby="currentTaskHeading">
        <div class="section-heading">
          <h2 id="currentTaskHeading">Current Task</h2>
          <span id="currentTaskState" class="meta-pill">Idle</span>
        </div>
        <div id="currentTask" class="empty-state">No command is running.</div>
      </section>

      <section class="panel history-panel" aria-labelledby="historyHeading">
        <div class="section-heading">
          <h2 id="historyHeading">Recent Tasks</h2>
          <span id="historyCount" class="meta-pill">0 / 20</span>
        </div>
        <ol id="historyList" class="history-list" aria-live="polite"></ol>
      </section>

      <div id="announcer" class="sr-only" aria-live="polite"></div>
    </main>
  </body>
</html>
